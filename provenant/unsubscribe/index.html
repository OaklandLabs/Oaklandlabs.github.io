<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe | Provenant</title>
    <meta name="description" content="Unsubscribe from Provenant wishlist alert emails.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="../../assets/OaklandLabs.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --muted: #8b95a5;
            --accent: #4f8ef7;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-logo {
            display: flex;
            justify-content: center;
            padding: 2.5rem 1.5rem 0;
        }
        .site-logo a { display: inline-flex; }
        .site-logo img {
            height: 100px;
            width: auto;
            object-fit: contain;
        }

        main {
            flex: 1;
            max-width: 560px;
            margin: 0 auto;
            padding: 3.5rem 1.5rem 5rem;
            width: 100%;
            text-align: center;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            object-fit: cover;
            margin: 0 auto 1.75rem;
            display: block;
            box-shadow: 0 12px 40px rgba(0,0,0,0.45);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #fff;
            margin-bottom: 0.6rem;
        }
        .tagline {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .spinner {
            width: 34px;
            height: 34px;
            margin: 0.5rem auto 0;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
            margin-top: 0.5rem;
        }
        .btn {
            display: block;
            width: 100%;
            max-width: 320px;
            padding: 0.95rem 1.5rem;
            border-radius: 12px;
            border: none;
            text-decoration: none;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.15s, background 0.2s, opacity 0.2s;
        }
        .btn:disabled { opacity: 0.6; cursor: default; }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-secondary:hover {
            border-color: rgba(79,142,247,0.5);
            background: #161922;
            transform: translateY(-1px);
        }

        footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding: 2rem;
        }
        .footer-inner {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        footer p { font-size: 0.8rem; color: var(--muted); }
        .footer-links { display: flex; gap: 1.25rem; flex-wrap: wrap; }
        .footer-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        .footer-links a[href^="mailto"] { color: var(--accent); }
        .footer-links a:hover { color: var(--text); }
        @media (max-width: 600px) { .footer-inner { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="site-logo">
        <a href="../../index.html" aria-label="Oakland Labs home">
            <img src="../../assets/OaklandLabs.png" alt="Oakland Labs">
        </a>
    </div>

    <main>
        <img src="../../assets/Provenant.png" alt="Provenant" class="app-icon">
        <h1 id="headline">Unsubscribing…</h1>
        <p class="tagline" id="tagline">One moment while we update your email preferences.</p>

        <div class="spinner" id="spinner"></div>

        <div class="actions">
            <button class="btn btn-primary" id="undo" type="button" hidden>Undo — keep me subscribed</button>
            <a class="btn btn-secondary" href="../index.html">Back to Provenant</a>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p>&copy; 2026 Oakland Labs LLC. All rights reserved.</p>
            <div class="footer-links">
                <a href="../../index.html">Home</a>
                <a href="../../privacy.html">Privacy Policy</a>
                <a href="../../terms.html">Terms of Service</a>
                <a href="mailto:support@oaklandlabs.app">support@oaklandlabs.app</a>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            // Direct edge-function endpoint (project ref xbwdrotfwiojupjphjzt).
            // This page performs the unsubscribe itself so the recipient never
            // leaves the brand domain. The email's List-Unsubscribe header points
            // straight at this same function for native one-click.
            var FUNCTION_URL =
                "https://xbwdrotfwiojupjphjzt.supabase.co/functions/v1/wishlist-alerts-unsubscribe";

            var headline = document.getElementById("headline");
            var tagline = document.getElementById("tagline");
            var spinner = document.getElementById("spinner");
            var undoBtn = document.getElementById("undo");

            function show(title, body) {
                headline.textContent = title;
                tagline.textContent = body;
                spinner.hidden = true;
                spinner.style.display = "none";
            }

            var params = new URLSearchParams(window.location.search);
            var token = params.get("token") || "";
            // Token shape is "<userId>.<signature>" — reject anything malformed
            // before bothering the server.
            if (!token || token.indexOf(".") <= 0) {
                show(
                    "Invalid link",
                    "This unsubscribe link is missing or malformed. If you keep getting emails, open Provenant and turn off alerts under Settings → Notifications, or email support@oaklandlabs.app."
                );
                return;
            }

            // POST the given action to the edge function. action=resubscribe
            // flips alerts back on; omitting it unsubscribes.
            function post(action) {
                var qs = "?token=" + encodeURIComponent(token);
                if (action) qs += "&action=" + encodeURIComponent(action);
                return fetch(FUNCTION_URL + qs, { method: "POST" });
            }

            post()
                .then(function (resp) {
                    if (resp.ok) {
                        show(
                            "You're unsubscribed",
                            "You won't receive any more wishlist alert emails. Changed your mind?"
                        );
                        undoBtn.hidden = false;
                    } else {
                        show(
                            "Couldn't unsubscribe",
                            "Something went wrong on our end. Please try again in a minute, or email support@oaklandlabs.app and we'll remove you manually."
                        );
                    }
                })
                .catch(function () {
                    show(
                        "Couldn't unsubscribe",
                        "We couldn't reach our servers. Please check your connection and try again, or email support@oaklandlabs.app and we'll remove you manually."
                    );
                });

            undoBtn.addEventListener("click", function () {
                undoBtn.disabled = true;
                undoBtn.textContent = "Re-subscribing…";
                post("resubscribe")
                    .then(function (resp) {
                        if (resp.ok) {
                            undoBtn.hidden = true;
                            show(
                                "You're subscribed again",
                                "Wishlist alert emails are back on. You can change this anytime in the app under Settings → Notifications."
                            );
                        } else {
                            undoBtn.disabled = false;
                            undoBtn.textContent = "Undo — keep me subscribed";
                            tagline.textContent =
                                "Couldn't re-subscribe just now. Please try again, or turn alerts back on in the app under Settings → Notifications.";
                        }
                    })
                    .catch(function () {
                        undoBtn.disabled = false;
                        undoBtn.textContent = "Undo — keep me subscribed";
                        tagline.textContent =
                            "We couldn't reach our servers. Please try again, or turn alerts back on in the app under Settings → Notifications.";
                    });
            });
        })();
    </script>

</body>
</html>
